name: Update zmx

on:
  schedule:
    - cron: "0 12 * * *" # Daily at noon UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force build and push to Cachix (skip version check)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  detect-updates:
    runs-on: ubuntu-latest
    outputs:
      release_needs_update: ${{ steps.check-release.outputs.needs_update }}
      release_current: ${{ steps.check-release.outputs.current }}
      release_latest: ${{ steps.check-release.outputs.latest }}
      main_needs_update: ${{ steps.check-main.outputs.needs_update }}
      main_current: ${{ steps.check-main.outputs.current }}
      main_latest: ${{ steps.check-main.outputs.latest }}
      should_run: ${{ steps.should-run.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new zmx release
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api graphql -f query='
            {
              repository(owner: "neurosnap", name: "zmx") {
                refs(refPrefix: "refs/tags/", last: 1, orderBy: {field: TAG_COMMIT_DATE, direction: ASC}) {
                  nodes { name }
                }
              }
            }' --jq '.data.repository.refs.nodes[0].name')
          current=$(grep -oP 'url = "github:neurosnap/zmx/\K[^"]+' flake.nix)

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest" ]; then
            echo "Already up to date ($current)"
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update available: $current -> $latest"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for new zmx main commits
        id: check-main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_main=$(gh api repos/neurosnap/zmx/commits/main --jq '.sha')
          current_main=$(jq -r '.nodes["zmx-src-main"].locked.rev' flake.lock)

          echo "current=$current_main" >> "$GITHUB_OUTPUT"
          echo "latest=$latest_main" >> "$GITHUB_OUTPUT"

          if [ "$current_main" = "$latest_main" ]; then
            echo "main already up to date ($current_main)"
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "main update available: ${current_main:0:9} -> ${latest_main:0:9}"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to build
        id: should-run
        run: |
          if [ "${{ steps.check-release.outputs.needs_update }}" = "true" ] || \
             [ "${{ steps.check-main.outputs.needs_update }}" = "true" ] || \
             [ "${{ inputs.force }}" = "true" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: detect-updates
    if: needs.detect-updates.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable unprivileged user namespaces
        if: matrix.os == 'ubuntu-latest'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: zmx
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update release in flake.nix
        if: needs.detect-updates.outputs.release_needs_update == 'true'
        run: |
          sed -i.bak "s|github:neurosnap/zmx/${{ needs.detect-updates.outputs.release_current }}|github:neurosnap/zmx/${{ needs.detect-updates.outputs.release_latest }}|" flake.nix
          rm -f flake.nix.bak
          nix flake update zmx-src

      - name: Update main in flake.lock
        if: needs.detect-updates.outputs.main_needs_update == 'true' || inputs.force
        run: nix flake update zmx-src-main

      - name: Build and push to Cachix
        run: |
          nix build .#zmx --print-out-paths | cachix push zmx
          nix build .#zmx-main --print-out-paths | cachix push zmx

  commit-changes:
    needs:
      - detect-updates
      - build-and-push
    if: needs.detect-updates.outputs.release_needs_update == 'true' || needs.detect-updates.outputs.main_needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update release in flake.nix
        if: needs.detect-updates.outputs.release_needs_update == 'true'
        run: |
          sed -i "s|github:neurosnap/zmx/${{ needs.detect-updates.outputs.release_current }}|github:neurosnap/zmx/${{ needs.detect-updates.outputs.release_latest }}|" flake.nix
          nix flake update zmx-src

      - name: Update main in flake.lock
        if: needs.detect-updates.outputs.main_needs_update == 'true'
        run: nix flake update zmx-src-main

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: >-
            chore: update zmx
            ${{ needs.detect-updates.outputs.release_needs_update == 'true'
              && format('(release {0})', needs.detect-updates.outputs.release_latest)
              || '' }}
            ${{ needs.detect-updates.outputs.main_needs_update == 'true'
              && format('(main {0})', needs.detect-updates.outputs.main_latest)
              || '' }}
